<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AlUla 360 - Login</title>
    <link rel="stylesheet" href="../global/main.css">
</head>
<body>
    <div id="Sign-in">
        <h2>Login</h2>
        <form action="../server/process_feedback.php" method="post">
            <p>
                <label for="user">Username:</label><br>
                <input type="text" id="user" name="username" required>
            </p>
            <p>
                <label for="Signin-pass">Password:</label><br>
                <input type="password" id="Signin-pass" name="password" required>
            </p>
            <p>
                <input type="submit" value="Sign In" onclick="handleLogin()" style="width: 100%;">
            </p>

            <script>
            function handleLogin() {
                // 1. Save the "logged in" status to the browser's memory
                localStorage.setItem('isLoggedIn', 'true');
                
                // 2. Redirect back to the home page
                window.location.href = "../index.html";
            }
            </script>
        </form>
        <p>Don't Have An Account? <a href="signup.html">SignUp here</a></p>
    </div>
</body>
</html>
